name: Sync wiki/ to GitHub Wiki

on:
  workflow_run:
    workflows: ["Update Wiki Documentation"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch || 'master' }}

      - name: Check wiki/ exists
        id: check
        run: |
          if [ -d wiki ] && [ "$(ls -A wiki/)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Wiki directory is empty or missing — skipping sync"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push wiki/ folder to GitHub Wiki
        if: steps.check.outputs.exists == 'true'
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: wiki/
          commit-message: "sync: wiki update"
