name: Initialize Wiki Documentation

on:
  workflow_dispatch:

permissions:
  contents: write
  models: read
  pull-requests: write

jobs:
  init:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if wiki already exists
        id: check
        run: |
          if [ -f wiki/Home.md ] && [ -f wiki/Release-Notes.md ]; then
            echo "Wiki files already exist. Delete them first to re-initialize."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve latest release
        if: steps.check.outputs.exists == 'false'
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput('tag', data.tag_name);
              core.setOutput('url', data.html_url);
              core.setOutput('date', data.published_at.split('T')[0]);
              console.log(`Latest release: ${data.tag_name}`);
            } catch (e) {
              const tags = await github.rest.repos.listTags({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 1,
              });
              if (tags.data.length > 0) {
                const tag = tags.data[0].name;
                core.setOutput('tag', tag);
                core.setOutput('url', `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`);
                core.setOutput('date', new Date().toISOString().split('T')[0]);
                console.log(`No release found, using latest tag: ${tag}`);
              } else {
                core.setOutput('tag', '');
                core.setOutput('url', '');
                core.setOutput('date', new Date().toISOString().split('T')[0]);
                console.log('No releases or tags found');
              }
            }

      - name: Collect repository context
        if: steps.check.outputs.exists == 'false'
        run: |
          find . -type f \( -name "*.php" -o -name "*.xml" -o -name "*.phtml" \) \
            | grep -v vendor | grep -v '.git' | sort > /tmp/file_tree.txt

          cat composer.json > /tmp/composer.txt 2>/dev/null || echo "No composer.json" > /tmp/composer.txt
          cat README.md > /tmp/readme.txt 2>/dev/null || echo "No README.md" > /tmp/readme.txt

          grep -rn --include="*.php" \
            -E '(^|\s)(class|interface|trait|public function|protected function|const )\s' \
            --exclude-dir=vendor \
            | head -200 > /tmp/signatures.txt

          find . -path "*/etc/module.xml" -exec cat {} + 2>/dev/null > /tmp/module_xml.txt || true

          find . \( -path "*/etc/config.xml" -o -path "*/etc/adminhtml/system.xml" \) \
            -exec cat {} + 2>/dev/null > /tmp/config_xml.txt || true

      - name: Generate initial documentation
        if: steps.check.outputs.exists == 'false'
        id: ai
        uses: actions/ai-inference@v1
        with:
          prompt-file: .github/prompts/init-wiki.prompt.yml
          input: |
            version: ${{ steps.release.outputs.tag }}
            release_url: ${{ steps.release.outputs.url }}
            release_date: ${{ steps.release.outputs.date }}
          file_input: |
            composer: /tmp/composer.txt
            readme: /tmp/readme.txt
            module_xml: /tmp/module_xml.txt
            config_xml: /tmp/config_xml.txt
            file_tree: /tmp/file_tree.txt
            signatures: /tmp/signatures.txt

      - name: Write wiki files
        if: steps.check.outputs.exists == 'false'
        env:
          AI_RESPONSE_FILE: ${{ steps.ai.outputs.response-file }}
        run: |
          mkdir -p wiki
          jq -r '.home_md' "$AI_RESPONSE_FILE" > wiki/Home.md
          jq -r '.release_notes' "$AI_RESPONSE_FILE" > wiki/Release-Notes.md

          echo "Generated wiki/Home.md ($(wc -c < wiki/Home.md) bytes)"
          echo "Generated wiki/Release-Notes.md ($(wc -c < wiki/Release-Notes.md) bytes)"

      - name: Create pull request
        if: steps.check.outputs.exists == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: docs/init-wiki
          title: "📝 docs: initial wiki documentation"
          body: |
            Auto-generated initial wiki documentation using `actions/ai-inference`.

            **Please review before merging:**
            - [ ] `wiki/Home.md` — module overview, features, configuration
            - [ ] `wiki/Release-Notes.md` — initial release entry

            Once merged, the `wiki-sync` workflow will publish to the GitHub Wiki.
          labels: documentation
          commit-message: "docs: generate initial wiki documentation"
