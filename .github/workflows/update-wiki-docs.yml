name: Update Wiki Documentation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to generate docs for (e.g. v1.2.0)'
        required: true

permissions:
  contents: write
  models: read

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Resolve release context
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            URL="${{ github.event.release.html_url }}"
            DATE=$(echo "${{ github.event.release.created_at }}" | cut -dT -f1)
          else
            TAG="${{ github.event.inputs.tag }}"
            URL="https://github.com/${{ github.repository }}/releases/tag/$TAG"
            DATE=$(date +%Y-%m-%d)
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Get diff from previous tag
        run: |
          TAG="${{ steps.release.outputs.tag }}"

          # Find the previous tag (by version sort, excluding the current one)
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — diffing against initial commit"
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Diffing $PREV_TAG..$TAG"

          # Changed file list
          git diff "$PREV_TAG" "$TAG" --name-only -- '*.php' '*.xml' '*.phtml' \
            | head -40 > /tmp/changed_files.txt

          # Structural diff only: file headers, context lines, and key code changes
          # Capped to ~12KB to stay well within 8K token limit with system prompt
          git diff "$PREV_TAG" "$TAG" -- '*.php' '*.xml' '*.phtml' \
            | grep -E '^(diff |---|\+\+\+|@@|[+-].*(class |interface |function |const |<config|<system|<field|<section|<group|<source_model|<frontend_model))' \
            | head -c 12000 > /tmp/release.diff

          # If structural diff is too small, fall back to stat summary
          if [ ! -s /tmp/release.diff ] || [ "$(wc -c < /tmp/release.diff)" -lt 100 ]; then
            git diff "$PREV_TAG" "$TAG" --stat -- '*.php' '*.xml' '*.phtml' \
              | head -c 12000 > /tmp/release.diff
          fi

      - name: Prepare current wiki content
        run: |
          mkdir -p wiki

          if [ -f wiki/Release-Notes.md ]; then
            cp wiki/Release-Notes.md /tmp/current_release_notes.md
          else
            echo "# Release Notes" > /tmp/current_release_notes.md
          fi

          if [ -f wiki/Home.md ]; then
            cp wiki/Home.md /tmp/current_home.md
          else
            echo "" > /tmp/current_home.md
          fi

      - name: Build user prompt
        run: |
          {
            echo "Update wiki for release **${{ steps.release.outputs.tag }}**."
            echo "URL: ${{ steps.release.outputs.url }}"
            echo "Date: ${{ steps.release.outputs.date }}"
            echo ""
            echo "Changed files:"
            cat /tmp/changed_files.txt
            echo ""
            echo "Diff:"
            cat /tmp/release.diff
          } > /tmp/user_prompt.txt

          echo "Prompt size: $(wc -c < /tmp/user_prompt.txt) bytes"

      - name: Generate documentation update
        id: ai
        uses: actions/ai-inference@v1
        with:
          system-prompt-file: .github/prompts/update-wiki-system.md
          prompt-file: /tmp/user_prompt.txt
          model: openai/gpt-4o
#          max-tokens: 8000

      - name: Apply documentation changes
        env:
          AI_RESPONSE_FILE: ${{ steps.ai.outputs.response-file }}
        run: |
          mkdir -p wiki

          echo "=== Raw AI response (first 500 chars) ==="
          head -c 500 "$AI_RESPONSE_FILE"
          echo ""
          echo "==="

          # Extract JSON from response — handle code fences, leading text, etc.
          # Try: 1) raw file as JSON, 2) strip fences, 3) extract JSON object with grep
          if jq empty "$AI_RESPONSE_FILE" 2>/dev/null; then
            cp "$AI_RESPONSE_FILE" /tmp/clean_response.json
          else
            # Strip markdown fences and any non-JSON lines
            sed '/^```/d' "$AI_RESPONSE_FILE" > /tmp/stripped.txt
            if jq empty /tmp/stripped.txt 2>/dev/null; then
              cp /tmp/stripped.txt /tmp/clean_response.json
            else
              # Last resort: extract everything between first { and last }
              sed -n '/^{/,/^}/p' /tmp/stripped.txt > /tmp/clean_response.json
              if ! jq empty /tmp/clean_response.json 2>/dev/null; then
                echo "ERROR: Could not parse AI response as JSON"
                echo "Full response:"
                cat "$AI_RESPONSE_FILE"
                exit 1
              fi
            fi
          fi

          # Extract the new release notes entry
          jq -r '.release_notes_entry' /tmp/clean_response.json > /tmp/new_entry.md

          # Update Release-Notes.md: insert new entry after the heading
          if [ -f wiki/Release-Notes.md ]; then
            {
              head -1 wiki/Release-Notes.md
              echo ""
              cat /tmp/new_entry.md
              echo ""
              tail -n +2 wiki/Release-Notes.md
            } > /tmp/updated_release_notes.md
            mv /tmp/updated_release_notes.md wiki/Release-Notes.md
          else
            {
              echo "# Release Notes"
              echo ""
              cat /tmp/new_entry.md
            } > wiki/Release-Notes.md
          fi

          # Update Home.md only if the AI returned content
          HOME_LENGTH=$(jq -r '.home_md | length' /tmp/clean_response.json)
          if [ "$HOME_LENGTH" -gt 0 ]; then
            jq -r '.home_md' /tmp/clean_response.json > wiki/Home.md
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki/
          if git diff --cached --quiet; then
            echo "No wiki changes to commit"
          else
            git commit -m "docs: update wiki for ${{ steps.release.outputs.tag }}"
            git push origin HEAD:master
          fi
