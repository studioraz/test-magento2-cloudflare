name: Update Documentation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to generate docs for (e.g. v1.2.0)'
        required: true

permissions:
  contents: write
  models: read

jobs:
  call-update-docs:
    uses: studioraz/ci-templates/.github/workflows/update-docs.yml@master
    with:
      tag: ${{ github.event.release.tag_name || inputs.tag }}
      url: ${{ github.event.release.html_url || '' }}
      date: ${{ github.event.release.created_at && format('{0}', github.event.release.created_at) || '' }}
    secrets: inherit
